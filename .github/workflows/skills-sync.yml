name: Sync skills from fork

# Reusable workflow. Consumer repos call it from their own scheduled workflow:
#
#   jobs:
#     sync:
#       uses: timschoch/mattpocock-skills/.github/workflows/skills-sync.yml@main
#       permissions:
#         contents: write
#         pull-requests: write
#       secrets: inherit
#
# It runs `npx skills update` against the CALLER's repo (skills-lock.json),
# then opens a PR when — and only when — something changed. No diff -> no PR.
# With auto-merge on (default), the PR is squash-merged as soon as it exists.
#
# Requires in each consumer repo: Settings -> Actions -> General ->
# "Allow GitHub Actions to create and approve pull requests" = enabled.
#
# Private skill sources: the runner's github.token only reads the caller repo.
# If skills-lock.json pins skills from a PRIVATE repo, add a repo secret
# LEMY_SKILLS_SYNC_TOKEN (fine-grained PAT, Contents: read on the source repo) in
# the consumer repo — `secrets: inherit` passes it through and the skills CLI
# picks it up as GITHUB_TOKEN below. Without it, private sources 404.

on:
  workflow_call:
    inputs:
      branch:
        description: Branch the sync PR is opened from
        type: string
        default: chore/sync-skills
      node-version:
        description: Node version used to run the skills CLI
        type: string
        default: "24"
      auto-merge:
        description: Squash-merge the sync PR automatically once opened
        type: boolean
        default: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Mark Claude Code as an installed agent
        # `skills update` writes to the shared `.agents/skills` store only when it
        # detects an installed agent, which it does by probing `$HOME/.claude` etc.
        # A bare CI runner has none, so it falls back to Eve's `agent/skills` dir
        # and opens a bogus duplicate-tree PR. Seeding `$HOME/.claude` makes it
        # resolve the same universal store this repo actually uses.
        run: mkdir -p "$HOME/.claude"

      - name: Update pinned skills
        env:
          GITHUB_TOKEN: ${{ secrets.LEMY_SKILLS_SYNC_TOKEN || github.token }}
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then echo "token: EMPTY"; else echo "token: len=${#GITHUB_TOKEN} prefix=${GITHUB_TOKEN:0:4}"; fi
          npx skills@latest update -p -y

      - name: Open PR if anything changed
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          branch: ${{ inputs.branch }}
          delete-branch: true
          commit-message: "chore(skills): sync skills from fork"
          title: "chore(skills): sync skills from fork"
          body: |
            Automated `npx skills update` — pulls the latest pinned skills from the fork.

            Only `.agents/skills/**` and `skills-lock.json` change. This PR is opened
            only when the update produced a diff; if the branch already exists it is
            updated in place rather than opening a second PR.

      - name: Auto-merge the sync PR
        if: >-
          inputs.auto-merge &&
          (steps.cpr.outputs.pull-request-operation == 'created' ||
           steps.cpr.outputs.pull-request-operation == 'updated')
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ steps.cpr.outputs.pull-request-number }}
        # Prefer native auto-merge (waits for required checks on protected repos).
        # Fall back to an admin squash-merge where auto-merge isn't available
        # (e.g. Free-plan private repos): --admin calls the REST merge directly so
        # a still-pending NON-required check (e.g. a Vercel preview) doesn't block it.
        run: gh pr merge "$PR" --squash --delete-branch --auto || gh pr merge "$PR" --squash --delete-branch --admin
